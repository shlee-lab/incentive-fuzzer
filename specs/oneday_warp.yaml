contract: targets/tier_g_oneday/WarpLPOracle.sol
contract_name: WarpLPOracle
deploy_value_wei: 0
deploy_args:
  - "@@USDC"
  - "@@WETH"
  - "@@DAI"

tokens:
  - name: USDC
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 USDC seed
      Attacker:  100_000_000_000_000_000_000_000     # 100,000 USDC pump + mint capital
  - name: WETH
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000         # 100 WETH seed
      Attacker:   30_000_000_000_000_000_000         # 30 WETH for LP mint
  - name: DAI
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000   # 1,000,000 DAI for lending

setup_calls:
  - { function: seed, args: { amtU: 100_000_000_000_000_000_000_000, amtW: 100_000_000_000_000_000_000 } }
  - { function: fundDAI, args: { amt: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: DAI
    callable_functions: [swapUsdcForWeth, swapWethForUsdc, mintLP, depositLP, borrowDAI, "USDC.transfer", "WETH.transfer"]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 2000
    compound_template:
      # Tight per-slot value pools — attack-pattern-specific values
      - fn: mintLP
        phase: 0
        values: [1_000_000_000_000_000_000_000, 1_000_000_000_000_000_000]   # 1000 USDC + 1 WETH
      - fn: depositLP
        phase: 1
        values: [1, 1_000_000_000_000_000_000, 10_000_000_000_000_000_000_000_000_000]   # any LP amount: dust, 1 LP, all
      - fn: "USDC.transfer"
        phase: 2
        values: [50_000_000_000_000_000_000_000, 80_000_000_000_000_000_000_000, 95_000_000_000_000_000_000_000]   # donate large USDC
      - fn: borrowDAI
        phase: 3
        values: [1, 1_000_000_000_000_000_000_000, 100_000_000_000_000_000_000_000, 500_000_000_000_000_000_000_000]

value_pool_extras:
  - 1_000_000_000_000_000_000_000           # 1,000 USDC mint amount
  - 10_000_000_000_000_000_000_000          # 10,000 USDC
  - 1_000_000_000_000_000_000               # 1 WETH
  - 10_000_000_000_000_000_000              # 10 WETH
  - 80_000_000_000_000_000_000_000          # 80,000 USDC pump
  - 100_000_000_000_000_000_000_000         # 100,000 USDC (max)
  - 100_000_000_000_000_000_000_000         # 100,000 DAI borrow target
  - 500_000_000_000_000_000_000_000         # 500,000 DAI
  - 100_000_000_000_000_000_000             # 100 LP shares deposit

expected_findings:
  - role: Attacker
    deviation_must_contain: [mintLP, depositLP, swapUsdcForWeth, borrowDAI]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
