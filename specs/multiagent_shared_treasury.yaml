contract: targets/tier_e_multiagent/SharedTreasury.sol
contract_name: SharedTreasury
deploy_value_wei: 100_000_000_000_000_000_000   # 100 ETH in pool

roles:
  - name: Alice
    initial_eth_wei: 10_000_000_000_000_000_000
    primary_asset: ETH
    default_phase: 0
    callable_functions: [claim]
    agent_type: best_response       # iterates best response
  - name: Bob
    initial_eth_wei: 10_000_000_000_000_000_000
    primary_asset: ETH
    default_phase: 1
    callable_functions: [claim]
    agent_type: best_response

honest_strategies:
  Alice:
    actions: []
  Bob:
    actions: []

mutator_hints:
  Alice:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    max_candidates_per_role: 10
  Bob:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    max_candidates_per_role: 10

expected_findings:
  - role: Alice
    deviation_must_contain: [claim]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 50_000_000_000_000_000_000
