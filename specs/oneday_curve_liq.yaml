contract: targets/tier_g_oneday/CurveCrvUSDLiq.sol
contract_name: CurveCrvUSDLiq
deploy_value_wei: 0
deploy_args:
  - "@@A"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M A for pool
      Borrower:   1_000_000_000_000_000_000_000        # 1000 A collateral
      LiquidatorBot: 1_000_000_000_000_000_000_000     # 1000 A backup liquidator capital (idle)

setup_calls:
  - { function: A.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Borrower
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [deposit, borrow, liquidate, setPrice]
  - name: LiquidatorBot
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: []

honest_strategies:
  Borrower:
    actions:
      - { function: deposit, args: { amt: 1_000_000_000_000_000_000_000 }, phase: 0 }   # 1000 A collateral
      - { function: borrow,  args: { amt: 600_000_000_000_000_000_000 }, phase: 1 }    # borrow 600 A (60% LTV)
  LiquidatorBot:
    actions: []

mutator_hints:
  Borrower:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 200
    compound_template:
      - fn: setPrice
        phase: 2
        values: [500_000_000_000_000_000]      # price drops to 0.5 → underwater
      - fn: liquidate
        phase: 3
        args:
          user: "@Borrower"
  LiquidatorBot:
    try_self_targeting: false
    try_skip_actions: false

expected_findings:
  - role: Borrower
    deviation_must_contain: [setPrice, liquidate]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
