contract: targets/tier2_realistic/YieldFarm.sol
contract_name: YieldFarm
deploy_value_wei: 0
deploy_args:
  - "@@STAKE"
  - "@@REWARD"

tokens:
  - name: STAKE
    decimals: 18
    initial_balances:
      User: 1_000_000_000_000_000_000_000          # 1000 STAKE
  - name: REWARD
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000  # 1M REWARD; admin will fund the farm

setup_calls:
  - { function: REWARD.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: User
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: REWARD
    callable_functions: [deposit, claim, withdraw]

honest_strategies:
  User:
    actions:
      - { function: deposit, args: { amount: 1_000_000_000_000_000_000 } }   # 1 STAKE
      - { function: advance_time, args: { seconds: 86400 } }                 # 1 day
      - { function: claim }
      - { function: withdraw }

mutator_hints:
  User:
    try_self_targeting: false
    try_skip_actions: true
    try_action_insertion: true
    try_numeric_mutation: false

expected_findings:
  - role: User
    deviation_must_contain: [deposit, claim]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000   # 1 REWARD token (18 decimals)
