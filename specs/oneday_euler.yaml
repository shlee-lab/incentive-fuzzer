contract: targets/tier_g_oneday/EulerDonate.sol
contract_name: EulerDonate
deploy_value_wei: 0
deploy_args:
  - "@@U"

tokens:
  - name: U
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000      # 1M U for the pool
      Attacker: 100_000_000_000_000_000_000_000         # 100k U deposit + repay capital

setup_calls:
  - { function: U.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: U
    callable_functions: [deposit, withdraw, borrow, repay, donateToReserves, liquidate]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 500
    compound_template:
      - fn: deposit
        phase: 0
        values: [100_000_000_000_000_000_000_000]
      - fn: borrow
        phase: 1
        values: [80_000_000_000_000_000_000_000]
      - fn: donateToReserves
        phase: 2
        values: [50_000_000_000_000_000_000_000]
      - fn: liquidate
        phase: 3
        args:
          user: "@Attacker"

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, borrow, donateToReserves, liquidate]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000   # +1000 U
