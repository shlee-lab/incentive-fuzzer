contract: targets/tier_f_oracle/OracleLending.sol
contract_name: OracleLending
deploy_value_wei: 0
deploy_args:
  - "@@COLL"
  - "@@STBL"

# Spot-price oracle manipulation. Attacker needs:
#  - enough COLL to be a meaningful position holder (so the pump
#    valuation increase is leveraged against their deposit), and
#  - enough STBL to actually move the pool.
#
# The successful attack shape is:
#   1) deposit <collateral>           — establish position at fair price
#   2) swapStblForColl <pump>         — push spot price upward
#   3) borrow <inflated capacity>     — extract STBL against inflated valuation
#
# Honest baseline is empty. Attacker's primary asset is STBL.
tokens:
  - name: COLL
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000             # 100 COLL to seed AMM
      Attacker:   50_000_000_000_000_000_000             # 50 COLL
  - name: STBL
    decimals: 18
    initial_balances:
      __admin__: 200_000_000_000_000_000_000_000         # 200,000 STBL: 100k AMM + 100k lending
      Attacker:   50_000_000_000_000_000_000_000         # 50,000 STBL pump capital

setup_calls:
  - { function: seed, args: { amtColl: 100_000_000_000_000_000_000, amtStbl: 100_000_000_000_000_000_000_000 } }
  - { function: fund, args: { amt: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: STBL
    callable_functions: [swapStblForColl, swapCollForStbl, deposit, borrow, withdraw]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    # 3-slot template: DEPOSIT collateral first (at fair price), then PUMP
    # the spot price up, then BORROW against the inflated valuation. The
    # mutator searches arg variants per slot.
    compound_template:
      - { fn: deposit,         phase: 0 }
      - { fn: swapStblForColl, phase: 1 }
      - { fn: borrow,          phase: 2 }

value_pool_extras:
  - 50_000_000_000_000_000_000        # 50 COLL deposit (all of attacker's COLL)
  - 40_000_000_000_000_000_000        # 40 COLL
  - 30_000_000_000_000_000_000        # 30 COLL
  - 50_000_000_000_000_000_000_000    # 50,000 STBL pump
  - 40_000_000_000_000_000_000_000    # 40,000 STBL
  - 30_000_000_000_000_000_000_000    # 30,000 STBL
  - 100_000_000_000_000_000_000_000   # 100,000 STBL borrow attempt
  - 80_000_000_000_000_000_000_000    # 80,000 STBL borrow
  - 50_000_000_000_000_000_000_000    # 50,000 STBL borrow

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, swapStblForColl, borrow]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 10_000_000_000_000_000_000_000   # 10,000 STBL net profit
