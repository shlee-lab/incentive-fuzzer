contract: targets/tier3_reproductions/UraniumPair.sol
contract_name: UraniumPair
deploy_value_wei: 0
deploy_args:
  - "@@TKA"
  - "@@TKB"

tokens:
  - name: TKA
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000     # admin holds liquidity to seed
      Attacker: 0                                   # attacker pays nothing in TKA
  - name: TKB
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000

setup_calls:
  - { function: addLiquidity, args: { amount0: 1_000_000_000_000_000_000_000, amount1: 1_000_000_000_000_000_000_000 } }   # seed 1000 / 1000
  - { function: TKB.transfer, args: { to: "@@self", amount: 1 } }   # 1 wei TKB stuck in pair satisfies `amount1In > 0`

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TKA
    callable_functions: [swap]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false

value_pool_extras:
  - 990_000_000_000_000_000_000     # 990 TKA — just under the bug-permissible drain limit (~99% of reserve)

expected_findings:
  - role: Attacker
    deviation_must_contain: [swap]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000_000   # 100 TKA
