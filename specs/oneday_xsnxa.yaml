contract: targets/tier_g_oneday/xSNXaNAV.sol
contract_name: xSNXaNAV
deploy_value_wei: 0
deploy_args:
  - "@@WETH"
  - "@@SNX"

tokens:
  - name: WETH
    decimals: 18
    initial_balances:
      __admin__: 200_000_000_000_000_000_000           # 200 WETH (100 AMM + 100 vault)
      Attacker:   80_000_000_000_000_000_000            # 80 WETH pump + mint
  - name: SNX
    decimals: 18
    initial_balances:
      __admin__: 200_000_000_000_000_000_000_000        # 200,000 SNX (100k AMM + 100k vault)
      Attacker:    1_000_000_000_000_000_000_000        # 1,000 SNX

setup_calls:
  - { function: seedAMM,   args: { amtSnx: 100_000_000_000_000_000_000_000, amtWeth: 100_000_000_000_000_000_000 } }
  - { function: fundVault, args: { amtSnx: 100_000_000_000_000_000_000_000, amtWeth: 100_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: WETH
    callable_functions: [mintShares, redeemShares, swapWethForSnx, swapSnxForWeth]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 2000
    compound_template:
      - { fn: mintShares,        phase: 0 }
      - { fn: swapWethForSnx,    phase: 1 }
      - { fn: redeemShares,      phase: 2 }

value_pool_extras:
  - 1_000_000_000_000_000_000               # 1 WETH mint
  - 10_000_000_000_000_000_000              # 10 WETH mint
  - 30_000_000_000_000_000_000              # 30 WETH pump
  - 50_000_000_000_000_000_000              # 50 WETH pump
  - 70_000_000_000_000_000_000              # 70 WETH pump (max)
  - 1_000_000_000_000_000_000               # 1 share redeem
  - 10_000_000_000_000_000_000              # 10 shares redeem
  - 100_000_000_000_000_000_000             # 100 shares redeem

expected_findings:
  - role: Attacker
    deviation_must_contain: [mintShares, swapWethForSnx, redeemShares]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000
