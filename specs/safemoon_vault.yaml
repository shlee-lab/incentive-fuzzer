contract: targets/tier3_reproductions/SafeMoonVault.sol
contract_name: SafeMoonVault
deploy_value_wei: 0
deploy_args:
  - "@@USDC"

tokens:
  - name: USDC
    decimals: 6
    initial_balances:
      Victim:   100_000_000_000     # 100,000 USDC
      Attacker: 1_000_000           # 1 USDC

roles:
  - name: Victim
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    callable_functions: [deposit, redeem]
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    callable_functions: [deposit, burn, redeem]

honest_strategies:
  Victim:
    actions:
      - { function: deposit, args: { amount: 100_000_000_000 }, phase: 0 }     # 100,000 USDC
      - { function: redeem,  args: { shares: 100_000_000_000 }, phase: 3 }     # full redemption (last)
  Attacker:
    actions:
      - { function: deposit, args: { amount: 1_000_000 }, phase: 1 }           # 1 USDC -> 1 share
      - { function: redeem,  args: { shares: 1_000_000 }, phase: 2 }           # before victim redeems

mutator_hints:
  Victim:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false

expected_findings:
  - role: Attacker
    deviation_must_contain: [burn]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 10_000_000_000   # 10,000 USDC drained
