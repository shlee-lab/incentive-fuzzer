contract: targets/tier_g_oneday/DydxCrossMargin.sol
contract_name: DydxCrossMargin
deploy_value_wei: 0
deploy_args:
  - "@@A"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M A insurance fund
      Attacker:    100_000_000_000_000_000_000_000     # 100k A capital

setup_calls:
  - { function: fundInsurance, args: { amt: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [postMargin, openLong, openShort, setPrice, liquidate]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 500
    compound_template:
      - fn: openLong
        phase: 0
        values: [10_000_000_000_000_000_000_000]      # open 10k size
      - fn: postMargin
        phase: 1
        values: [1_000_000_000_000_000_000_000]       # tiny 1000 margin (under-margined)
      - fn: setPrice
        phase: 2
        values: [1_001_000_000_000_000_000_000]       # tiny price wiggle
      - fn: liquidate
        phase: 3
        args:
          user: "@Attacker"

expected_findings:
  - role: Attacker
    deviation_must_contain: [openLong, postMargin, liquidate]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000   # +1000 A from insurance
