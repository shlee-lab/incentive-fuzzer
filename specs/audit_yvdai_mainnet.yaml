contract: targets/tier_c_mainnet/IERC4626.sol
contract_name: IERC4626
contract_address: "0x028eC7330ff87667b6dfb0D94b954c820195336c"   # Yearn V3 yvDAI
fork:
  url: "${ALCHEMY_ETH_RPC}"

# Yearn V3 vault mainnet attach. Tests whether the strategist-report
# manipulation our reduction caught (YearnV3Report) is reachable on
# the actual Yearn V3 vault. Generic ERC4626 interface — report() is
# NOT in standard ERC4626 ABI, so calling it requires a Yearn-specific
# ABI port. With the standard ERC4626 port, only deposit/redeem/
# withdraw/mint are reachable.
roles:
  - name: Attacker
    initial_eth_wei: 10_000_000_000_000_000_000_000
    primary_asset: ETH
    callable_functions: [deposit, redeem, withdraw, mint]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    max_candidates_per_role: 30

expected_findings: []
