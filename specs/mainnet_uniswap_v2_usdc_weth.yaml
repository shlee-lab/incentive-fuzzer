contract: targets/tier_b_canonical/UniswapV2Pair.sol     # ABI source (our 0.8 port matches V2 signatures)
contract_name: UniswapV2Pair
contract_address: "0xB4e16d0168e52d35CaCD2c6185b44281Ec28C9Dc"   # canonical USDC/WETH V2 Pair on mainnet
fork:
  url: "https://ethereum-rpc.publicnode.com"
  # block omitted -> anvil uses latest. Free public RPCs typically retain only
  # ~128 blocks of historical state, so pinning a specific old block fails.

# No tokens block needed — we don't fund the attacker. The mainnet pair
# already has real reserves; attacker tries swap with no input balance,
# which must revert (amount_in == 0 -> INSUFFICIENT_INPUT_AMOUNT).

roles:
  - name: Attacker
    initial_eth_wei: 10_000_000_000_000_000_000     # 10 ETH for gas
    primary_asset: ETH
    callable_functions: [swap, sync, skim]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    max_candidates_per_role: 100   # public RPC = slow; keep small

expected_findings: []
