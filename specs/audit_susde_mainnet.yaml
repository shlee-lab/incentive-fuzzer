contract: targets/tier_c_mainnet/IERC4626.sol
contract_name: IERC4626
contract_address: "0x9D39A5DE30e57443BfF2A8307A4256c8797A3497"   # sUSDe Ethena
fork:
  url: "${ALCHEMY_ETH_RPC}"

# Test whether the first-depositor share-inflation pattern that we
# detected on BeefyShareInflation reduction is reachable on a
# production-deployed ERC4626 vault. Expected: NO — production vaults
# are no longer empty by the time we attach, so the inflation vector
# is closed.
roles:
  - name: Attacker
    initial_eth_wei: 10_000_000_000_000_000_000_000
    primary_asset: ETH
    callable_functions: [deposit, redeem, withdraw, mint]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    max_candidates_per_role: 30

expected_findings: []
