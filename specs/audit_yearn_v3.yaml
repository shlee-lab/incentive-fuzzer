contract: targets/tier_h_audit/YearnV3Report.sol
contract_name: YearnV3Report
deploy_value_wei: 0
deploy_args:
  - "@@A"
  - "@Strategist"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__:    100_000_000_000_000_000_000_000     # 100k A (existing depositors)
      Strategist:    10_000_000_000_000_000_000_000     # 10k A self-deposit
      OtherUser:    100_000_000_000_000_000_000_000     # 100k A honest

setup_calls:
  - { function: deposit, args: { amt: 100_000_000_000_000_000_000_000 } }   # admin pre-deposits

roles:
  - name: Strategist
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [deposit, withdraw, report]
  - name: OtherUser
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [deposit]

honest_strategies:
  Strategist:
    actions: []
  OtherUser:
    actions:
      - { function: deposit, args: { amt: 100_000_000_000_000_000_000_000 }, phase: 0 }

mutator_hints:
  Strategist:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 300
    compound_template:
      - fn: deposit
        phase: 1
        values: [10_000_000_000_000_000_000_000]
      - fn: report
        phase: 2
        args: { profit: 1_000_000_000_000_000_000_000_000 }    # report 1M profit
      - fn: withdraw
        phase: 3
        values: [10_000_000_000_000_000_000_000]
  OtherUser:
    try_self_targeting: false
    try_skip_actions: false

expected_findings:
  - role: Strategist
    deviation_must_contain: [deposit, report, withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
