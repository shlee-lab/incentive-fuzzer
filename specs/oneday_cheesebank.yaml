contract: targets/tier_g_oneday/CheeseBankV1.sol
contract_name: CheeseBankV1
deploy_value_wei: 0
deploy_args:
  - "@@X"
  - "@@WETH"
  - "@@DAI"

tokens:
  - name: X
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 X seed pool
      Attacker:    1_000_000_000_000_000_000_000     # 1,000 X dust collateral
  - name: WETH
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000         # 100 WETH seed
      Attacker:   80_000_000_000_000_000_000         # 80 WETH pump capital
  - name: DAI
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000   # 1,000,000 DAI for lending

setup_calls:
  - { function: seedPool, args: { amtX: 100_000_000_000_000_000_000_000, amtW: 100_000_000_000_000_000_000 } }
  - { function: fundDAI,  args: { amt: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: DAI
    callable_functions: [depositX, swapWethForX, swapXForWeth, borrowDAI]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 1500
    compound_template:
      - { fn: depositX,         phase: 0 }
      - { fn: swapWethForX,     phase: 1 }
      - { fn: borrowDAI,        phase: 2 }

value_pool_extras:
  - 1_000_000_000_000_000_000_000           # 1,000 X deposit
  - 100_000_000_000_000_000_000             # 100 X deposit
  - 30_000_000_000_000_000_000              # 30 WETH pump
  - 60_000_000_000_000_000_000              # 60 WETH pump
  - 80_000_000_000_000_000_000              # 80 WETH pump (max)
  - 100_000_000_000_000_000_000_000         # 100,000 DAI borrow
  - 500_000_000_000_000_000_000_000         # 500,000 DAI borrow

expected_findings:
  - role: Attacker
    deviation_must_contain: [depositX, swapWethForX, borrowDAI]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
