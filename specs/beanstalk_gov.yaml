contract: targets/tier3_reproductions/BeanstalkGov.sol
contract_name: BeanstalkGov
deploy_value_wei: 0
deploy_args:
  - "@@VOTE"
  - "@@TRSY"

tokens:
  - name: VOTE
    decimals: 18
    initial_balances:
      HonestStaker: 100_000_000_000_000_000_000           # 100 VOTE (honest community stake)
      Attacker:    1_000_000_000_000_000_000_000          # 1000 VOTE (capital available to flip majority)
  - name: TRSY
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000            # 1000 TRSY -> treasury

setup_calls:
  - { function: TRSY.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000 } }

roles:
  - name: HonestStaker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: VOTE
    callable_functions: [deposit, withdraw]
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TRSY
    callable_functions: [deposit, proposeAndExecute, withdraw]

honest_strategies:
  HonestStaker:
    actions:
      - { function: deposit,  args: { amount: 100_000_000_000_000_000_000 }, phase: 0 }
      - { function: withdraw, args: { amount: 100_000_000_000_000_000_000 }, phase: 5 }
  Attacker:
    actions: []

mutator_hints:
  HonestStaker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true       # try every callable as a single insertion
    try_numeric_mutation: false
    try_compound_pair_insertion: true # AND try every (fn1, fn2) pair — fuzzer must discover the (deposit, proposeAndExecute) order itself
    # phases intentionally OMITTED: mutator falls back to (role_default, role_default+1).
    # No compound_template — fuzzer is not told which functions to chain.

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, proposeAndExecute]   # withdraw not required: TRSY metric doesn't care about VOTE recovery
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000_000   # 100 TRSY
