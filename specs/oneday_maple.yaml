contract: targets/tier_g_oneday/MapleDelegate.sol
contract_name: MapleDelegate
deploy_value_wei: 0
deploy_args:
  - "@@A"
  - "@Delegate"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__:  100_000_000_000_000_000_000_000       # 100,000 A (honest depositor proxy)
      Delegate:  1_000_000_000_000_000_000_000_000      # 1M A capital (delegate sandwiches harvest)

setup_calls:
  - { function: deposit, args: { amt: 100_000_000_000_000_000_000_000 } }   # admin pre-deposits 100k

roles:
  - name: Delegate
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [deposit, withdraw, harvest, claimDelegateFee]

honest_strategies:
  Delegate:
    actions: []

mutator_hints:
  Delegate:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 500
    compound_template:
      - fn: deposit
        phase: 0
        values: [1_000_000_000_000_000_000_000_000]      # 1M A self-deposit before harvest
      - fn: harvest
        phase: 1
        args: {}
      - fn: claimDelegateFee
        phase: 2
        args: {}
      - fn: withdraw
        phase: 3
        values: [1_000_000_000_000_000_000_000_000]

expected_findings:
  - role: Delegate
    deviation_must_contain: [deposit, harvest, claimDelegateFee, withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000   # +1000 A from inflated fee
