contract: targets/tier_h_audit/MakerPSMPeg.sol
contract_name: MakerPSMPeg
deploy_value_wei: 0
deploy_args:
  - "@@USDC"
  - "@@DAI"

tokens:
  - name: USDC
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M USDC seed
      Attacker:    10_000_000_000_000_000_000_000     # 10k USDC capital
  - name: DAI
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M DAI seed
      Attacker:    10_000_000_000_000_000_000_000     # 10k DAI capital

# Pool config: PSM 500k each side, AMM depegged with cheap USDC / expensive DAI.
setup_calls:
  - { function: seed, args: { psmU: 500_000_000_000_000_000_000_000, psmD: 500_000_000_000_000_000_000_000, ammU: 100_000_000_000_000_000_000_000, ammD: 50_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    callable_functions: [psmMintDai, psmMintUsdc, swapDaiForUsdc, swapUsdcForDai]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 300
    compound_template:
      - fn: psmMintDai
        phase: 0
        values: [10_000_000_000_000_000_000_000]
      - fn: swapDaiForUsdc
        phase: 1
        values: [10_000_000_000_000_000_000_000]

expected_findings:
  - role: Attacker
    deviation_must_contain: [psmMintDai, swapDaiForUsdc]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
