contract: targets/tier_g_oneday/InverseLPOracle.sol
contract_name: InverseLPOracle
deploy_value_wei: 0
deploy_args:
  - "@@INV"
  - "@@WETH"
  - "@@DOLA"

# Inverse Finance 2022-04 (~$15.6M). INV collateral valued via Sushi INV/WETH spot.
# Pump WETH/INV pair → over-borrow DOLA.
tokens:
  - name: INV
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000          # 100 INV seed
      Attacker:    1_000_000_000_000_000_000          # 1 INV (dust collateral)
  - name: WETH
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000          # 100 WETH seed
      Attacker:   50_000_000_000_000_000_000          # 50 WETH pump capital
  - name: DOLA
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000    # 1,000,000 DOLA for lending

setup_calls:
  - { function: seedPair, args: { amtInv: 100_000_000_000_000_000_000, amtWeth: 100_000_000_000_000_000_000 } }
  - { function: fundDOLA, args: { amt: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: DOLA
    callable_functions: [depositINV, swapWethForInv, swapInvForWeth, borrowDOLA]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    compound_template:
      - { fn: depositINV,        phase: 0 }
      - { fn: swapWethForInv,    phase: 1 }
      - { fn: borrowDOLA,        phase: 2 }

value_pool_extras:
  - 1_000_000_000_000_000_000               # 1 INV deposit
  - 40_000_000_000_000_000_000              # 40 WETH pump
  - 30_000_000_000_000_000_000              # 30 WETH pump
  - 50_000_000_000_000_000_000              # 50 WETH pump (max)
  - 100_000_000_000_000_000_000_000         # 100,000 DOLA borrow
  - 500_000_000_000_000_000_000_000         # 500,000 DOLA borrow
  - 1_000_000_000_000_000_000_000           # 1,000 DOLA borrow

expected_findings:
  - role: Attacker
    deviation_must_contain: [depositINV, swapWethForInv, borrowDOLA]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000   # +1000 DOLA
