contract: targets/tier_g_oneday/AlphaHomoraFakeLP.sol
contract_name: AlphaHomoraFakeLP
deploy_value_wei: 0
deploy_args:
  - "@@USDC"

tokens:
  - name: USDC
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000       # 1M USDC for lending

setup_calls:
  - { function: fund, args: { amt: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    callable_functions: [setLpValue, depositLP, borrow]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 500
    compound_template:
      - fn: setLpValue
        phase: 0
        args:
          lp: "@Attacker"
          value: 1_000_000_000_000_000_000_000_000     # 1M "value" per LP unit (1e24 wei valuation)
      - fn: depositLP
        phase: 1
        args:
          lp: "@Attacker"
          amt: 1_000_000_000_000_000_000               # 1 LP unit deposit
      - fn: borrow
        phase: 2
        values: [100_000_000_000_000_000_000_000, 500_000_000_000_000_000_000_000]

expected_findings:
  - role: Attacker
    deviation_must_contain: [setLpValue, depositLP, borrow]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000_000_000
