contract: targets/tier_d_reentrancy/RORVault.sol
contract_name: RORVault
deploy_value_wei: 50_000_000_000_000_000_000   # 50 ETH consumer reserve

roles:
  - name: HonestUser
    initial_eth_wei: 200_000_000_000_000_000_000
    primary_asset: ETH
    default_phase: 0
    callable_functions: [deposit, withdraw]
  - name: Attacker
    initial_eth_wei: 100_000_000_000_000_000_000
    primary_asset: ETH
    default_phase: 2
    callable_functions: [attack]
    code_path: targets/tier_d_reentrancy/RORAttacker.sol
    code_name: RORAttacker

honest_strategies:
  HonestUser:
    actions:
      - { function: deposit, args: { value_wei: 100_000_000_000_000_000_000 }, phase: 0 }
  Attacker:
    actions: []

mutator_hints:
  HonestUser:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false

expected_findings:
  - role: Attacker
    deviation_must_contain: [attack]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 500_000_000_000_000_000   # 0.5 ETH
