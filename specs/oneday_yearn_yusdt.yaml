contract: targets/tier_g_oneday/YearnYUSDT.sol
contract_name: YearnYUSDT
deploy_value_wei: 0
deploy_args:
  - "@@USDT"
  - "@@USDC"

tokens:
  - name: USDT
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 USDT seed
      Attacker:   50_000_000_000_000_000_000_000     # 50,000 USDT (pump + deposit)
  - name: USDC
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000
      Attacker:   50_000_000_000_000_000_000_000

setup_calls:
  - { function: seed, args: { a0: 100_000_000_000_000_000_000_000, a1: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDT
    callable_functions: [swap0For1, swap1For0, deposit, withdraw]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 1500
    compound_template:
      - fn: swap0For1
        phase: 0
        values: [40_000_000_000_000_000_000_000, 50_000_000_000_000_000_000_000]
      - fn: deposit
        phase: 1
        values: [10_000_000_000_000_000_000_000]
      - fn: swap1For0
        phase: 2
        values: [40_000_000_000_000_000_000_000, 50_000_000_000_000_000_000_000]
      - fn: withdraw
        phase: 3
        values: [10_000_000_000_000_000_000_000, 100_000_000_000_000_000_000_000]

expected_findings:
  - role: Attacker
    deviation_must_contain: [swap0For1, deposit, swap1For0, withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000
