contract: targets/tier1_trivial/SimpleLending.sol
contract_name: SimpleLending
deploy_value_wei: 10_000_000_000_000_000_000_000   # 10000 ETH initial liquidity

roles:
  - name: Borrower
    initial_eth_wei: 1_000_000_000_000_000_000_000   # 1000 ETH
    callable_functions: [deposit, borrow, liquidate]
  - name: Liquidator
    initial_eth_wei: 1_000_000_000_000_000_000_000   # 1000 ETH
    callable_functions: [liquidate]

honest_strategies:
  Borrower:
    actions:
      - { function: deposit, args: { value_wei: 100_000_000_000_000_000_000 } }   # 100 ETH collateral
      - { function: borrow,  args: { amount_wei: 60_000_000_000_000_000_000 } }   # 60 ETH borrow
      - { function: simulate_price_drop, args: { factor: 0.7 } }                  # collateral revalued
      - { function: wait }
  Liquidator:
    actions:
      - { function: liquidate, args: { user: "@Borrower_if_underwater", value_wei: 60_000_000_000_000_000_000 } }

mutator_hints:
  Borrower:
    try_self_targeting: true
    try_skip_actions: true
    try_action_insertion: true
    try_numeric_mutation: false

expected_findings:
  - role: Borrower
    deviation_must_contain: [liquidate]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 5_000_000_000_000_000_000   # 5 ETH
