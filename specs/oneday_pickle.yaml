contract: targets/tier_g_oneday/PickleJarSwap.sol
contract_name: PickleJarSwap
deploy_value_wei: 0
deploy_args:
  - "@@T"

tokens:
  - name: T
    decimals: 18
    initial_balances:
      __admin__: 300_000_000_000_000_000_000_000     # 300,000 T (100k seed A + 100k seed B + slack)
      Attacker:  100_000_000_000_000_000_000_000     # 100,000 T

# Both jars seeded with 100 T from admin, then attacker can:
# - deposit some to jar A
# - DONATE T to jar B (via T.transfer to contract → bumps underlyingB)
#   ...but underlyingB is a contract storage var, not derived from balanceOf.
#   Actually for Pickle the bug was different — let's model the swap-ratio
#   misuse: attacker depositsA(big) → ratio fine, but swapAForB after they
#   gamed jar B via depositB(small)/withdrawB pattern that desyncs supply.
setup_calls:
  - { function: depositA, args: { amt: 100_000_000_000_000_000_000_000 } }   # admin stakes 100k in jar A
  - { function: depositB, args: { amt: 100_000_000_000_000_000_000_000 } }   # admin stakes 100k in jar B (need T from admin)

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: T
    callable_functions: [depositA, depositB, withdrawA, withdrawB, swapAForB]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 2000
    compound_template:
      - fn: depositA
        phase: 0
        values: [1_000_000_000_000_000_000_000, 10_000_000_000_000_000_000_000]
      - fn: depositB
        phase: 1
        values: [1_000_000_000_000_000_000_000, 50_000_000_000_000_000_000_000]
      - fn: swapAForB
        phase: 2
        values: [1_000_000_000_000_000_000_000, 10_000_000_000_000_000_000_000]
      - fn: withdrawB
        phase: 3
        values: [1_000_000_000_000_000_000_000, 10_000_000_000_000_000_000_000, 100_000_000_000_000_000_000_000]

expected_findings:
  - role: Attacker
    deviation_must_contain: [depositA, swapAForB, withdrawB]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000
