contract: targets/tier1_trivial/SimpleLending.sol
contract_name: SimpleLending
deploy_value_wei: 10000000000000000000000
roles:
- name: Borrower
  initial_eth_wei: 1000000000000000000000
  callable_functions:
  - deposit
  - borrow
  - liquidate
- name: Liquidator
  initial_eth_wei: 1000000000000000000000
  callable_functions:
  - liquidate
honest_strategies:
  Borrower:
    actions:
    - function: deposit
      args:
        value_wei: 100000000000000000000
    - function: borrow
      args:
        amount_wei: 60000000000000000000
    - function: simulate_price_drop
      args:
        factor: 0.7
    - function: wait
  Liquidator:
    actions:
    - function: liquidate
      args:
        user: '@Borrower_if_underwater'
        value_wei: 60000000000000000000
mutator_hints:
  Borrower:
    try_self_targeting: true
    try_skip_actions: true
    try_action_insertion: true
    try_numeric_mutation: false
    auto_compound_templates: true
    max_candidates_per_role: 3000
expected_findings:
- role: Borrower
  payoff_higher_than_honest: true
  min_payoff_diff_wei: 5000000000000000000
