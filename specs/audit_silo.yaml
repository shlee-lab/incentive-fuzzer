contract: targets/tier_h_audit/SiloIsolatedArb.sol
contract_name: SiloIsolatedArb
deploy_value_wei: 0
deploy_args:
  - "@@C"
  - "@@D"

tokens:
  - name: C
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000
      Attacker:  10_000_000_000_000_000_000_000
  - name: D
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000

setup_calls:
  - { function: D.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: D
    callable_functions: [depositA, withdrawA, borrowA, depositB, borrowB]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 300
    compound_template:
      - fn: depositA
        phase: 0
        values: [10_000_000_000_000_000_000_000]      # 10k C
      - fn: borrowA
        phase: 1
        values: [6_000_000_000_000_000_000_000]       # 6k D (60% LTV)
      - fn: borrowB
        phase: 2
        values: [6_000_000_000_000_000_000_000]       # SAME collateral, double-borrow!

expected_findings:
  - role: Attacker
    deviation_must_contain: [depositA, borrowA, borrowB]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
