contract: targets/tier_h_audit/AaveEModeLiq.sol
contract_name: AaveEModeLiq
deploy_value_wei: 0
deploy_args:
  - "@@C"
  - "@@D"

tokens:
  - name: C
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M C (bonus pool)
      Attacker:  1_000_000_000_000_000_000_000         # 1000 C collateral
  - name: D
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M D for borrow + liquidate
      Attacker:  1_000_000_000_000_000_000_000         # 1000 D for repay

setup_calls:
  - { function: C.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }
  - { function: D.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: C
    callable_functions: [deposit, borrow, setPrices, liquidate]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 500
    compound_template:
      - fn: deposit
        phase: 0
        values: [1_000_000_000_000_000_000_000]
      - fn: borrow
        phase: 1
        values: [970_000_000_000_000_000_000]            # 97% LTV
      - fn: setPrices
        phase: 2
        args: { cP: 1_000_000_000_000_000_000, dP: 1_010_000_000_000_000_000 }   # tiny debt-price wiggle
      - fn: liquidate
        phase: 3
        args:
          user: "@Attacker"

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, borrow, setPrices, liquidate]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 10_000_000_000_000_000_000   # +10 C from 6% bonus
