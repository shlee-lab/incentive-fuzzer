contract: targets/tier_g_oneday/BzxMargin.sol
contract_name: BzxMargin
deploy_value_wei: 0
deploy_args:
  - "@@SETH"
  - "@@WBTC"

# bZx margin attack (Feb 2020, ~$350K). Platform routes margin trade
# through internal Kyber-style AMM with no slippage check. Attacker holds
# WBTC inventory; opens a huge sETH→WBTC margin position (pumps Kyber
# WBTC price), then sells their WBTC inventory into the pumped pool.
tokens:
  - name: SETH
    decimals: 18
    initial_balances:
      __admin__: 2_000_000_000_000_000_000_000      # 2000 sETH (1000 platform + 100 seed + slack)
      Attacker:   50_000_000_000_000_000_000        # 50 sETH for opening margin
  - name: WBTC
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000        # 100 WBTC seed
      Attacker:    5_000_000_000_000_000_000        # 5 WBTC inventory

setup_calls:
  - { function: seed, args: { amtSeth: 100_000_000_000_000_000_000, amtWbtc: 100_000_000_000_000_000_000 } }
  - { function: fundPlatformMargin, args: { amtSeth: 1_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: SETH
    callable_functions: [openMarginPosition, swapWbtcForSeth]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    compound_template:
      - { fn: openMarginPosition,  phase: 0 }
      - { fn: swapWbtcForSeth,     phase: 1 }

value_pool_extras:
  - 50_000_000_000_000_000_000              # 50 sETH margin open
  - 100_000_000_000_000_000_000             # 100 sETH margin open
  - 250_000_000_000_000_000_000             # 250 sETH margin open
  - 1_000_000_000_000_000_000               # 1 WBTC swap
  - 5_000_000_000_000_000_000               # 5 WBTC swap (max attacker inventory)

expected_findings:
  - role: Attacker
    deviation_must_contain: [openMarginPosition, swapWbtcForSeth]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000     # +1 sETH net profit
