contract: targets/tier_g_oneday/PancakeBunnyMint.sol
contract_name: PancakeBunnyMint
deploy_value_wei: 0
deploy_args:
  - "@@LP"
  - "@@QUOTE"

tokens:
  - name: LP
    decimals: 18
    initial_balances:
      Attacker: 1_000_000_000_000_000_000
  - name: QUOTE
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000
      Attacker:  50_000_000_000_000_000_000_000

setup_calls:
  - { function: seed, args: { amtBunny: 100_000_000_000_000_000_000, amtQuote: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: QUOTE
    callable_functions: [stake, unstake, claim, swapQuoteForBunny, swapBunnyForQuote]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    auto_compound_templates: true
    max_candidates_per_role: 2000

value_pool_extras:
  - 1_000_000_000_000_000_000
  - 40_000_000_000_000_000_000_000
  - 50_000_000_000_000_000_000_000
  - 100_000_000_000_000_000_000
  - 1_000_000_000_000_000_000_000
  - 10_000_000_000_000_000_000_000

expected_findings:
  - role: Attacker
    deviation_must_contain: [stake, swapQuoteForBunny, claim]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
