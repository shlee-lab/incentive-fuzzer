contract: targets/tier_h_audit/CompoundV3BorrowCap.sol
contract_name: CompoundV3BorrowCap
deploy_value_wei: 0
deploy_args:
  - "@@A"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000
      Attacker:  100_000_000_000_000_000_000_000

setup_calls:
  - { function: A.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [supply, withdraw, bumpRewardIndex, claim]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 200
    compound_template:
      - fn: supply
        phase: 0
        values: [100_000_000_000_000_000_000_000]
      - fn: bumpRewardIndex
        phase: 1
        values: [1_000_000_000_000_000_000]
      - fn: claim
        phase: 2
        args: {}
      - fn: withdraw
        phase: 3
        values: [100_000_000_000_000_000_000_000]

expected_findings:
  - role: Attacker
    deviation_must_contain: [supply, bumpRewardIndex, claim, withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
