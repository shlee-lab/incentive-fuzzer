contract: targets/tier3_reproductions/UraniumPairFull.sol
contract_name: UraniumPairFull
deploy_value_wei: 0
deploy_args:
  - "@@TKA"
  - "@@TKB"

tokens:
  - name: TKA
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000
      Attacker: 0
  - name: TKB
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000

# Real UniswapV2 mint/burn require pre-transfer of underlying. We mimic that
# in setup: admin transfers 1000 TKA + 1000 TKB to the pair, then calls sync()
# to register them as reserves. (We skip the mint() call — the swap-side bug
# doesn't depend on LP shares existing; using sync is functionally equivalent
# for the K-invariant attack and avoids modeling LP token addresses.) Then 1
# wei TKB donation puts pair-balance > reserve, satisfying `amount1In > 0`
# in swap so the drain is reachable.
setup_calls:
  - { function: TKA.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000 } }
  - { function: TKB.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000 } }
  - { function: sync }
  - { function: TKB.transfer, args: { to: "@@self", amount: 1 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TKA
    # Full attack surface exposed: every public state-changing function.
    callable_functions: [swap, sync, skim, mint, burn]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: true
    try_skip_actions: false        # honest is empty, nothing to skip
    try_action_insertion: true     # depth 1: every callable as a single insert
    try_numeric_mutation: false
    try_compound_pair_insertion: true  # depth 2: try all (fn,fn) pairs

value_pool_extras:
  - 990_000_000_000_000_000_000     # 990 TKA — close to the K-bug drain ceiling

expected_findings:
  - role: Attacker
    deviation_must_contain: [swap]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000_000   # 100 TKA
