contract: targets/tier3_reproductions/DonationVault.sol
contract_name: DonationVault
deploy_value_wei: 0
deploy_args:
  - "@@USDC"

tokens:
  - name: USDC
    decimals: 6
    initial_balances:
      Victim:   100_000_000           # 100 USDC
      Attacker: 1_000_000_000_000     # 1,000,000 USDC (Attacker is the well-funded party)

roles:
  - name: Victim
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    default_phase: 2                # Victim deposits AFTER attacker's setup
    callable_functions: [deposit, redeem]
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    default_phase: 0                # Attacker starts at phase 0 (depth 1=0, 2=1, 3=2)
    callable_functions: [deposit, donate, redeem]

honest_strategies:
  Victim:
    actions:
      - { function: deposit, args: { amount: 100_000_000 } }   # 100 USDC, phase 2 by default
  Attacker:
    actions: []

mutator_hints:
  Victim:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    # Autonomous depth-3 beam search.
    compound_beam_max_depth: 3
    compound_beam_width: 12

value_pool_extras:
  - 1                           # 1 wei — required as small first-mint amount

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, donate, redeem]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 50_000_000   # 50 USDC (half of victim's deposit)
