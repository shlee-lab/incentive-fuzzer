contract: targets/tier_c_mainnet/WETH9.sol
contract_name: WETH9
contract_address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
fork:
  url: "${ALCHEMY_ETH_RPC}"

# Attempt reentrancy attack on REAL mainnet WETH9. WETH9 uses
# msg.sender.transfer(wad) (2300-gas limit) AND decrements balance
# BEFORE the transfer. Either defense alone blocks reentry. Expected:
# 0 TP — framework should correctly NOT find a drain.

roles:
  - name: HonestUser
    initial_eth_wei: 50_000_000_000_000_000_000      # 50 ETH
    primary_asset: ETH
    default_phase: 0
    callable_functions: [deposit, withdraw]
  - name: Attacker
    initial_eth_wei: 10_000_000_000_000_000_000      # 10 ETH
    primary_asset: ETH
    default_phase: 2
    callable_functions: [attack, sweep]
    code_path: targets/tier_d_reentrancy/ReentrancyAttacker.sol
    code_name: ReentrancyAttacker

honest_strategies:
  HonestUser:
    actions:
      - { function: deposit, args: { value_wei: 10_000_000_000_000_000_000 }, phase: 0 }   # honest 10 ETH deposit to WETH
  Attacker:
    actions: []

mutator_hints:
  HonestUser:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    try_compound_pair_insertion: true
    max_candidates_per_role: 300

expected_findings: []
