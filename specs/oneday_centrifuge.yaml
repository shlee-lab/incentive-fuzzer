contract: targets/tier_g_oneday/CentrifugeBondClaim.sol
contract_name: CentrifugeBondClaim
deploy_value_wei: 0
deploy_args:
  - "@@P"
  - "@@Y"

tokens:
  - name: P
    decimals: 18
    initial_balances:
      __admin__:  100_000_000_000_000_000_000_000      # 100k P (honest bonders)
      Attacker:   100_000_000_000_000_000_000_000      # 100k P
  - name: Y
    decimals: 18
    initial_balances:
      __admin__:  10_000_000_000_000_000_000_000       # 10k Y for distribute

setup_calls:
  - { function: buyBond, args: { amt: 100_000_000_000_000_000_000_000 } }   # admin bonds 100k P (honest)

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: Y
    callable_functions: [buyBond, distribute, claim, withdrawBond]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 200
    compound_template:
      - fn: buyBond
        phase: 0
        values: [100_000_000_000_000_000_000_000]
      - fn: distribute
        phase: 1
        values: [10_000_000_000_000_000_000_000]
      - fn: claim
        phase: 2
        args: {}
      - fn: withdrawBond
        phase: 3
        values: [100_000_000_000_000_000_000_000]

expected_findings:
  - role: Attacker
    deviation_must_contain: [buyBond, distribute, claim, withdrawBond]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
