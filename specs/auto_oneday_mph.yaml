contract: targets/tier_g_oneday/MphFrontRun.sol
contract_name: MphFrontRun
deploy_value_wei: 0
deploy_args:
- '@@ASSET'
- '@@REWARD'
tokens:
- name: ASSET
  decimals: 18
  initial_balances:
    __admin__: 100000000000000000000000
    Attacker: 100000000000000000000000
- name: REWARD
  decimals: 18
  initial_balances:
    __admin__: 1000000000000000000000000
setup_calls:
- function: deposit
  args:
    amt: 100000000000000000000000
- function: REWARD.transfer
  args:
    to: '@@self'
    amount: 1000000000000000000000000
roles:
- name: Attacker
  initial_eth_wei: 1000000000000000000000
  primary_asset: REWARD
  callable_functions:
  - deposit
  - withdraw
  - harvest
  - claimReward
honest_strategies:
  Attacker:
    actions: []
mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 3000
    auto_compound_templates: true
expected_findings:
- role: Attacker
  payoff_higher_than_honest: true
  min_payoff_diff_wei: 1000000000000000000
