contract: targets/tier3_reproductions/DonationVault.sol
contract_name: DonationVault
deploy_value_wei: 0
deploy_args:
  - "@@USDC"

# Same contract as donation_vault.yaml, but callable_functions does NOT include
# the convenience `donate(amount)` helper. The attacker must autonomously
# synthesize the inflation attack using a raw `USDC.transfer(@@self, X)` —
# i.e., a cross-contract call. Validates that the mutator can:
#   - generate Token.fn callable variants (USDC.transfer)
#   - target @@self (the deployed main contract address) for ERC20 transfers
#   - find the same depth-3 attack via the cross-contract path

tokens:
  - name: USDC
    decimals: 6
    initial_balances:
      Victim:   100_000_000
      Attacker: 1_000_000_000_000

roles:
  - name: Victim
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    default_phase: 2
    callable_functions: [deposit, redeem]
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    default_phase: 0
    # NO `donate` here. The vault has it, but we deliberately don't expose it.
    # USDC.transfer(@@self, X) is the cross-contract substitute the fuzzer must use.
    callable_functions: [deposit, redeem, "USDC.transfer"]

honest_strategies:
  Victim:
    actions:
      - { function: deposit, args: { amount: 100_000_000 } }
  Attacker:
    actions: []

mutator_hints:
  Victim:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    compound_beam_max_depth: 3
    compound_beam_width: 30
    max_candidates_per_role: 3000   # explicit user budget (coverage control)

value_pool_extras:
  - 1

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, "USDC.transfer", redeem]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 50_000_000   # 50 USDC
