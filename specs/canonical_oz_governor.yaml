contract: targets/tier_b_canonical/OZGovernor.sol
contract_name: OZGovernor
deploy_value_wei: 0
deploy_args:
  - "@@VOTE"
  - "@@TRSY"

# Honest scenario: HonestStaker holds the vast majority of VOTE; Attacker
# holds a minority. Attacker tries the Beanstalk-style attack
# [deposit → proposeAndExecute → withdraw]. Expected: REVERT at
# proposeAndExecute because Attacker's stake (limited to their own
# 100 VOTE) is below totalSupply/2 quorum.

tokens:
  - name: VOTE
    decimals: 18
    initial_balances:
      HonestStaker: 1_000_000_000_000_000_000_000   # 1000 VOTE (the legitimate community)
      Attacker:       100_000_000_000_000_000_000   # 100 VOTE (minority)
  - name: TRSY
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000

setup_calls:
  - { function: TRSY.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000 } }

roles:
  - name: HonestStaker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: VOTE
    callable_functions: [deposit, withdraw]
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TRSY
    callable_functions: [deposit, proposeAndExecute, withdraw]

honest_strategies:
  HonestStaker:
    actions: []   # passive — doesn't even need to participate
  Attacker:
    actions: []

mutator_hints:
  HonestStaker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    try_compound_pair_insertion: true
    compound_beam_max_depth: 3
    compound_beam_width: 25
    max_candidates_per_role: 2500

expected_findings: []
