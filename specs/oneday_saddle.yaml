contract: targets/tier_g_oneday/SaddleMetapool.sol
contract_name: SaddleMetapool
deploy_value_wei: 0
deploy_args:
  - "@@A"
  - "@@B"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 A seed
      Attacker:   50_000_000_000_000_000_000_000     # 50,000 A pump capital
  - name: B
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 B seed
      Attacker:   50_000_000_000_000_000_000_000     # 50,000 B pump capital

setup_calls:
  - { function: addLiquidity, args: { amtA: 100_000_000_000_000_000_000_000, amtB: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [swapAForB, swapBForA, addLiquidity, removeLiquidity]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 2000
    compound_template:
      - { fn: swapAForB,         phase: 0 }
      - { fn: addLiquidity,      phase: 1 }
      - { fn: swapBForA,         phase: 2 }
      - { fn: removeLiquidity,   phase: 3 }

value_pool_extras:
  - 30_000_000_000_000_000_000_000          # 30,000 A swap
  - 50_000_000_000_000_000_000_000          # 50,000 A swap
  - 10_000_000_000_000_000_000_000          # 10,000 A
  - 40_000_000_000_000_000_000_000          # 40,000 B
  - 50_000_000_000_000_000_000_000          # 50,000 B swap
  - 1_000_000_000_000_000_000_000_000       # large LP burn
  - 100_000_000_000_000_000_000_000_000     # very large LP burn

expected_findings:
  - role: Attacker
    deviation_must_contain: [swapAForB, addLiquidity, swapBForA, removeLiquidity]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000
