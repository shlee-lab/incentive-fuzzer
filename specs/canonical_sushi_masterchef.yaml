contract: targets/tier_a_canonical/SushiMasterChef.sol
contract_name: SushiMasterChef
deploy_value_wei: 0
deploy_args:
  - "@@LP"
  - "@@SUSHI"
  - 1_000_000_000_000     # sushiPerSecond

# Same shape as yield_farm.yaml. Expected: NO finding — MasterChef's
# rewardDebt pattern correctly snapshots pending rewards on the user's
# old balance before modifying it, so deposit-flash-claim doesn't
# inflate.

tokens:
  - name: LP
    decimals: 18
    initial_balances:
      User: 1_000_000_000_000_000_000_000
  - name: SUSHI
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000

setup_calls:
  - { function: SUSHI.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: User
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: SUSHI
    callable_functions: [deposit, withdraw]

honest_strategies:
  User:
    actions:
      - { function: deposit,  args: { amount: 1_000_000_000_000_000_000 } }
      - { function: advance_time, args: { seconds: 86400 } }
      - { function: withdraw, args: { amount: 1_000_000_000_000_000_000 } }   # withdraw also pays out rewards

mutator_hints:
  User:
    try_self_targeting: false
    try_skip_actions: true
    try_action_insertion: true
    try_numeric_mutation: false
    compound_beam_max_depth: 3
    compound_beam_width: 20
    max_candidates_per_role: 2000

expected_findings: []
