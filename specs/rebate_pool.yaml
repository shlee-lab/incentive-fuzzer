contract: targets/tier2_realistic/RebatePool.sol
contract_name: RebatePool
deploy_value_wei: 0
deploy_args:
  - "@@TKA"
  - "@@TKB"

tokens:
  - name: TKA
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000   # 10000 TKA for liquidity
      Victim:    1_000_000_000_000_000_000_000    # 1000 TKA
      MEV:       1_000_000_000_000_000_000_000    # 1000 TKA
  - name: TKB
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000

setup_calls:
  - { function: addLiquidity, args: { amountA: 1_000_000_000_000_000_000_000, amountB: 1_000_000_000_000_000_000_000 } }   # 1000 TKA + 1000 TKB

roles:
  - name: Victim
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TKB
    default_phase: 1
    callable_functions: [swapAtoB, claimRebate]
  - name: MEV
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TKA
    default_phase: 2          # explicitly run AFTER victim
    callable_functions: [swapAtoB, claimRebate]

honest_strategies:
  Victim:
    actions:
      - { function: swapAtoB, args: { amountIn: 100_000_000_000_000_000_000 } }   # swap 100 TKA for B
  MEV:
    actions: []

mutator_hints:
  Victim:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  MEV:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false

expected_findings:
  - role: MEV
    deviation_must_contain: [claimRebate]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000   # 0.1 TKA (18 decimals)
