contract: targets/tier_g_oneday/OlympusInverseBond.sol
contract_name: OlympusInverseBond
deploy_value_wei: 0
deploy_args:
  - "@@PAYOUT"
  - "@@BOND"

tokens:
  - name: PAYOUT
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M PAYOUT bank
  - name: BOND
    decimals: 18
    initial_balances:
      Attacker:  10_000_000_000_000_000_000_000        # 10,000 BOND for bonding

setup_calls:
  - { function: fund, args: { amt: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: PAYOUT
    callable_functions: [bond, claim, advance_time]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 500
    compound_template:
      - fn: bond
        phase: 0
        values: [10_000_000_000_000_000_000_000]      # 10,000 BOND
      - fn: advance_time
        phase: 1
        args: { seconds: 604800 }                     # 7 days vest
      - fn: claim
        phase: 2
        args: {}
      - fn: claim
        phase: 3
        args: {}
      - fn: claim
        phase: 4
        args: {}

expected_findings:
  - role: Attacker
    deviation_must_contain: [bond, claim]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 20_000_000_000_000_000_000_000   # +20,000 PAYOUT (claim called repeatedly)
