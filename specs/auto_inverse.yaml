contract: targets/tier_g_oneday/InverseLPOracle.sol
contract_name: InverseLPOracle
deploy_value_wei: 0
deploy_args:
  - "@@INV"
  - "@@WETH"
  - "@@DOLA"

tokens:
  - name: INV
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000
      Attacker:    1_000_000_000_000_000_000
  - name: WETH
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000
      Attacker:   50_000_000_000_000_000_000
  - name: DOLA
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000

setup_calls:
  - { function: seedPair, args: { amtInv: 100_000_000_000_000_000_000, amtWeth: 100_000_000_000_000_000_000 } }
  - { function: fundDOLA, args: { amt: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: DOLA
    callable_functions: [depositINV, swapWethForInv, swapInvForWeth, borrowDOLA]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    auto_compound_templates: true
    max_candidates_per_role: 1500

value_pool_extras:
  - 1_000_000_000_000_000_000
  - 30_000_000_000_000_000_000
  - 40_000_000_000_000_000_000
  - 50_000_000_000_000_000_000
  - 1_000_000_000_000_000_000_000
  - 100_000_000_000_000_000_000_000
  - 500_000_000_000_000_000_000_000

expected_findings:
  - role: Attacker
    deviation_must_contain: [depositINV, swapWethForInv, borrowDOLA]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
