contract: targets/tier_g_oneday/EminenceBond.sol
contract_name: EminenceBond
deploy_value_wei: 0
deploy_args:
  - "@@DAI"

# Eminence 2020-09 (~$15M). Bonding curve buy & sell share the same
# DAI reserve atomically. Attacker buys small, then pumps the curve by
# buying huge, then sells the small position at the inflated price.
tokens:
  - name: DAI
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000   # 100,000 DAI initial reserve
      Attacker:  50_000_000_000_000_000_000_000    # 50,000 DAI capital

setup_calls:
  - { function: buyEMN, args: { daiIn: 100_000_000_000_000_000_000_000 } }   # seed reserve via admin buy

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: DAI
    callable_functions: [buyEMN, sellEMN]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    compound_template:
      - { fn: buyEMN,   phase: 0 }
      - { fn: buyEMN,   phase: 1 }
      - { fn: sellEMN,  phase: 2 }

value_pool_extras:
  - 1_000_000_000_000_000_000_000             # 1,000 DAI (small initial buy)
  - 5_000_000_000_000_000_000_000             # 5,000 DAI
  - 40_000_000_000_000_000_000_000            # 40,000 DAI pump
  - 45_000_000_000_000_000_000_000            # 45,000 DAI pump
  - 50_000_000_000_000_000_000_000            # 50,000 DAI pump
  # EMN amounts span many orders of magnitude — initial buys yield ~3e6 EMN
  # because of the sqrt-based bonding curve, so sell amounts must include
  # values in that scale (in wei: 1e6 EMN = 1e24 wei).
  - 1_000_000_000_000_000_000_000             # 1e21 wei = 1e3 EMN
  - 100_000_000_000_000_000_000_000           # 1e23 wei = 1e5 EMN
  - 1_000_000_000_000_000_000_000_000         # 1e24 wei = 1e6 EMN
  - 10_000_000_000_000_000_000_000_000        # 1e25 wei = 1e7 EMN
  - 100_000_000_000_000_000_000_000_000       # 1e26 wei = 1e8 EMN
  - 1_000_000_000_000_000_000_000_000_000     # 1e27 wei = 1e9 EMN

expected_findings:
  - role: Attacker
    deviation_must_contain: [buyEMN, sellEMN]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000     # +1 DAI net
