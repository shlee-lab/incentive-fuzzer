contract: targets/tier_g_oneday/HarvestCurveVP.sol
contract_name: HarvestCurveVP
deploy_value_wei: 0
deploy_args:
  - "@@USDC"
  - "@@USDT"

# Harvest Finance 2020-10 (~$34M). Vault shares priced via Curve VP.
# Imbalance the pool → deposit at low VP → rebalance → withdraw at higher VP.
tokens:
  - name: USDC
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 USDC seed
      Attacker:  50_000_000_000_000_000_000_000      # 50,000 USDC for deposit
  - name: USDT
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 USDT seed
      Attacker:  50_000_000_000_000_000_000_000      # 50,000 USDT pump capital

setup_calls:
  - { function: seed, args: { amtUSDC: 100_000_000_000_000_000_000_000, amtUSDT: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    callable_functions: [swapUsdtForUsdc, swapUsdcForUsdt, deposit, withdraw]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 1500
    # Imbalance pool → deposit at low VP → rebalance → withdraw at higher VP.
    compound_template:
      - { fn: swapUsdtForUsdc,   phase: 0 }
      - { fn: deposit,           phase: 1 }
      - { fn: swapUsdcForUsdt,   phase: 2 }
      - { fn: withdraw,          phase: 3 }

value_pool_extras:
  - 40_000_000_000_000_000_000_000          # 40,000 USDT imbalance
  - 30_000_000_000_000_000_000_000          # 30,000 USDT imbalance
  - 50_000_000_000_000_000_000_000          # 50,000 USDT
  - 10_000_000_000_000_000_000_000          # 10,000 USDC deposit
  - 30_000_000_000_000_000_000_000          # 30,000 USDC deposit
  - 50_000_000_000_000_000_000_000          # 50,000 USDC (max attacker capital)
  - 1_000_000_000_000_000_000_000_000       # withdraw all shares (large)
  - 100_000_000_000_000_000_000_000         # 100,000 shares
  - 50_000_000_000_000_000_000_000          # 50,000 shares

expected_findings:
  - role: Attacker
    deviation_must_contain: [swapUsdtForUsdc, deposit, swapUsdcForUsdt, withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000   # +1 USDC net
