contract: targets/tier_g_oneday/JITLiquidity.sol
contract_name: JITLiquidity
deploy_value_wei: 0
deploy_args:
  - "@@A"
  - "@@B"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__:  100_000_000_000_000_000_000_000     # 100k A seed + swap
      Attacker:   100_000_000_000_000_000_000_000     # 100k A JIT capital
      VictimSwapper: 50_000_000_000_000_000_000_000   # 50k A for the victim swap
  - name: B
    decimals: 18
    initial_balances:
      __admin__:  100_000_000_000_000_000_000_000
      Attacker:   100_000_000_000_000_000_000_000

setup_calls:
  - { function: seed, args: { amtA: 100_000_000_000_000_000_000_000, amtB: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [addLiquidity, removeLiquidity, claimFee]
  - name: VictimSwapper
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [swapAForB]

honest_strategies:
  Attacker:
    actions: []
  VictimSwapper:
    actions:
      - { function: swapAForB, args: { amtIn: 50_000_000_000_000_000_000_000 }, phase: 2 }

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 200
    compound_template:
      - fn: addLiquidity
        phase: 1
        values: [50_000_000_000_000_000_000_000]      # add 50k A + 50k B JIT
      - fn: removeLiquidity
        phase: 3
        values: [50_000_000_000_000_000_000_000]      # burn ~all of attacker's LP
      - fn: claimFee
        phase: 4
        args: {}
  VictimSwapper:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false

expected_findings:
  - role: Attacker
    deviation_must_contain: [addLiquidity, claimFee, removeLiquidity]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000     # +0.1 A
