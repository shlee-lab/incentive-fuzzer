contract: targets/tier_h_audit/TraderJoeLBJit.sol
contract_name: TraderJoeLBJit
deploy_value_wei: 0
deploy_args:
  - "@@A"
  - "@@B"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000
      Attacker:  100_000_000_000_000_000_000_000
      Victim:     50_000_000_000_000_000_000_000
  - name: B
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000
      Attacker:  100_000_000_000_000_000_000_000

setup_calls:
  - { function: seedBin, args: { amtA: 100_000_000_000_000_000_000_000, amtB: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [addToBin, removeFromBin, claimFee]
  - name: Victim
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [swapAforB]

honest_strategies:
  Attacker:
    actions: []
  Victim:
    actions:
      - { function: swapAforB, args: { amtIn: 50_000_000_000_000_000_000_000 }, phase: 2 }

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 200
    compound_template:
      - fn: addToBin
        phase: 1
        values: [50_000_000_000_000_000_000_000]
      - fn: removeFromBin
        phase: 3
        values: [50_000_000_000_000_000_000_000]
      - fn: claimFee
        phase: 4
        args: {}
  Victim:
    try_self_targeting: false
    try_skip_actions: false

expected_findings:
  - role: Attacker
    deviation_must_contain: [addToBin, removeFromBin, claimFee]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000
