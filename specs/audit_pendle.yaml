contract: targets/tier_h_audit/PendleYTArb.sol
contract_name: PendleYTArb
deploy_value_wei: 0
deploy_args:
  - "@@U"

tokens:
  - name: U
    decimals: 18
    initial_balances:
      __admin__: 500_000_000_000_000_000_000_000   # 500k U (300k contract reserve + 200k seed)
      Attacker:  100_000_000_000_000_000_000_000   # 100k U mint capital

setup_calls:
  - { function: seed, args: { amtP: 100_000_000_000_000_000_000_000, amtY: 100_000_000_000_000_000_000_000, amtU: 100_000_000_000_000_000_000_000 } }
  - { function: U.transfer, args: { to: "@@self", amount: 300_000_000_000_000_000_000_000 } }    # contract reserve for redeemPT
  - { function: setExpiry, args: { flag: true } }    # expire-window flagged

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: U
    callable_functions: [mintPair, swapYTforPT, redeemPT]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 200
    compound_template:
      - fn: mintPair
        phase: 0
        values: [100_000_000_000_000_000_000_000]
      - fn: swapYTforPT
        phase: 1
        values: [100_000_000_000_000_000_000_000]
      - fn: redeemPT
        phase: 2
        values: [200_000_000_000_000_000_000_000, 250_000_000_000_000_000_000_000]    # mint gives 100k+swap 1.5x = 250k; partial 200k OK

expected_findings:
  - role: Attacker
    deviation_must_contain: [mintPair, swapYTforPT, redeemPT]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 10_000_000_000_000_000_000_000
