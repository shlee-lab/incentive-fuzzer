contract: targets/tier_h_audit/SfraxYieldFront.sol
contract_name: SfraxYieldFront
deploy_value_wei: 0
deploy_args:
  - "@@A"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__:  10_000_000_000_000_000_000_000          # 10k A holder proxy
      Attacker:   500_000_000_000_000_000_000_000         # 500k A JIT deposit
      Yielder:    100_000_000_000_000_000_000_000         # 100k A for keeper yield event

# Pre-existing depositor — admin proxies the long-term holder.
setup_calls:
  - { function: deposit, args: { amt: 10_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [deposit, withdraw]
  - name: Yielder
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [addYield]

honest_strategies:
  Attacker:
    actions: []
  Yielder:
    actions:
      - { function: addYield, args: { amt: 100_000_000_000_000_000_000_000 }, phase: 1 }

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 200
    compound_template:
      - fn: deposit
        phase: 0
        values: [500_000_000_000_000_000_000_000]
      - fn: withdraw
        phase: 2
        values: [500_000_000_000_000_000_000_000]
  Yielder:
    try_self_targeting: false
    try_skip_actions: false

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 10_000_000_000_000_000_000_000
