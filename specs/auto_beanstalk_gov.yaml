contract: targets/tier3_reproductions/BeanstalkGov.sol
contract_name: BeanstalkGov
deploy_value_wei: 0
deploy_args:
- '@@VOTE'
- '@@TRSY'
tokens:
- name: VOTE
  decimals: 18
  initial_balances:
    HonestStaker: 100000000000000000000
    Attacker: 1000000000000000000000
- name: TRSY
  decimals: 18
  initial_balances:
    __admin__: 1000000000000000000000
setup_calls:
- function: TRSY.transfer
  args:
    to: '@@self'
    amount: 1000000000000000000000
roles:
- name: HonestStaker
  initial_eth_wei: 1000000000000000000000
  primary_asset: VOTE
  callable_functions:
  - deposit
  - withdraw
- name: Attacker
  initial_eth_wei: 1000000000000000000000
  primary_asset: TRSY
  callable_functions:
  - deposit
  - proposeAndExecute
  - withdraw
honest_strategies:
  HonestStaker:
    actions:
    - function: deposit
      args:
        amount: 100000000000000000000
      phase: 0
    - function: withdraw
      args:
        amount: 100000000000000000000
      phase: 5
  Attacker:
    actions: []
mutator_hints:
  HonestStaker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    auto_compound_templates: true
    max_candidates_per_role: 3000
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    try_compound_pair_insertion: true
    auto_compound_templates: true
    max_candidates_per_role: 3000
expected_findings:
- role: Attacker
  payoff_higher_than_honest: true
  min_payoff_diff_wei: 100000000000000000000
