contract: targets/tier2_realistic/SandwichPool.sol
contract_name: SandwichPool
deploy_value_wei: 0
deploy_args:
  - "@@TKA"
  - "@@TKB"

tokens:
  - name: TKA
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000   # 10000 TKA for liquidity
      Victim:    1_000_000_000_000_000_000_000    # 1000 TKA
      MEV:       2_000_000_000_000_000_000_000    # 2000 TKA (room to frontrun big)
  - name: TKB
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000

setup_calls:
  - { function: addLiquidity, args: { amountA: 1_000_000_000_000_000_000_000, amountB: 1_000_000_000_000_000_000_000 } }   # 1000 / 1000

roles:
  - name: Victim
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TKB
    default_phase: 1
    callable_functions: [swapAtoB]
  - name: MEV
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TKA
    default_phase: 5         # never used (MEV honestly does nothing); compound mutation supplies phases
    callable_functions: [swapAtoB, swapAllBtoA]

honest_strategies:
  Victim:
    actions:
      - { function: swapAtoB, args: { amountIn: 100_000_000_000_000_000_000 } }
  MEV:
    actions: []

mutator_hints:
  Victim:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  MEV:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: true
    compound_phase_first: 0    # frontrun (before victim phase 1)
    compound_phase_second: 2   # backrun (after victim phase 1)

expected_findings:
  - role: MEV
    deviation_must_contain: [swapAtoB, swapAllBtoA]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000   # 1 TKA
