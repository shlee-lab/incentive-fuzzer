contract: targets/tier_c_mainnet/WETH9.sol
contract_name: WETH9
contract_address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
fork:
  url: "${ALCHEMY_ETH_RPC}"

# POSITIVE CONTROL via storage injection on a REAL mainnet contract:
# We use anvil_setStorageAt to write Attacker's WETH balance to a large
# value directly into WETH9's storage (balanceOf mapping at slot 3).
# Honest scenario: Attacker does nothing (no honest WETH withdrawal).
# Deviation found: Attacker calls withdraw(amount) and converts the
# injected WETH balance into real ETH. Demonstrates that the fuzzer
# discovers profitable paths on real-mainnet-deployed bytecode when
# the (injected) state allows them.
#
# This is the strongest positive control — same WETH9 contract that
# we just FP-confirmed has zero TPs on a fresh Attacker, now yields
# a TP when state is corrupted.

tokens:
  - name: WETH
    decimals: 18
    address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
    storage_balance_slot: 3        # WETH9.balanceOf mapping is at slot 3
    initial_balances:
      Attacker: 1_000_000_000_000_000_000_000   # 1000 WETH (injected)

roles:
  - name: Attacker
    initial_eth_wei: 10_000_000_000_000_000_000
    primary_asset: ETH
    callable_functions: [deposit, withdraw, transfer, transferFrom, approve]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    max_candidates_per_role: 150

value_pool_extras:
  - 1_000_000_000_000_000_000_000

expected_findings:
  - role: Attacker
    deviation_must_contain: [withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000_000   # 100 ETH
