contract: targets/tier3_reproductions/BeanstalkGov.sol
contract_name: BeanstalkGov
deploy_value_wei: 0
deploy_args:
  - "@@VOTE"
  - "@@TRSY"

# HISTORICAL POSITIVE CONTROL: deploy our BeanstalkGov reproduction
# atop a mainnet fork at BLOCK 14602789 — the block immediately before
# the real Beanstalk Farms governance-drain attack on April 17, 2022.
#
# This proves: applied at the actual historical moment when the
# vulnerable economic state existed in production, our framework finds
# the same governance-drain pattern that was exploited for ~$182M.
#
# (We attach our simplified BeanstalkGov rather than the real Beanstalk
# Diamond contract because the latter uses EIP-2535 Diamond pattern
# with multiple facets, custom BIP encoding, and silo-deposit voting
# weights — wiring all that into our fuzzer would require hundreds of
# lines of ABI port. The economic VULNERABILITY is identical in both:
# transient voting majority is not snapshotted, so a flash-acquired
# stake can pass and execute a malicious proposal atomically.)

fork:
  url: "${ALCHEMY_ETH_RPC}"
  block: 14602789

tokens:
  - name: VOTE
    decimals: 18
    initial_balances:
      HonestStaker: 100_000_000_000_000_000_000
      Attacker:    1_000_000_000_000_000_000_000
  - name: TRSY
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000

setup_calls:
  - { function: TRSY.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000 } }

roles:
  - name: HonestStaker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: VOTE
    callable_functions: [deposit, withdraw]
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TRSY
    callable_functions: [deposit, proposeAndExecute, withdraw]

honest_strategies:
  HonestStaker:
    actions: []
  Attacker:
    actions: []

mutator_hints:
  HonestStaker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    try_compound_pair_insertion: true

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, proposeAndExecute]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 100_000_000_000_000_000_000
