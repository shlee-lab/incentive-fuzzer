contract: targets/tier_g_oneday/ConvexVoteBribe.sol
contract_name: ConvexVoteBribe
deploy_value_wei: 0
deploy_args:
  - "@@VOTE"
  - "@@BRIBE"

tokens:
  - name: VOTE
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000     # 1M VOTE (honest voters proxy)
      Attacker: 10_000_000_000_000_000_000_000        # 10,000 VOTE (flash-style)
  - name: BRIBE
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000      # 100,000 BRIBE to deposit
      Briber:     1_000_000_000_000_000_000_000      # 1000 BRIBE (other briber side)

setup_calls:
  - { function: depositBribe, args: { gauge: "@@self", amt: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Briber
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: BRIBE
    callable_functions: []
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: BRIBE
    callable_functions: [voteOnGauge, claimBribe, unvote]

honest_strategies:
  Briber:
    actions: []
  Attacker:
    actions: []

mutator_hints:
  Briber:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 500
    compound_template:
      - fn: voteOnGauge
        phase: 0
        args:
          gauge: "@@self"
          amt: 10_000_000_000_000_000_000_000
      - fn: claimBribe
        phase: 1
        args:
          gauge: "@@self"
      - fn: unvote
        phase: 2
        args:
          gauge: "@@self"
          amt: 10_000_000_000_000_000_000_000

expected_findings:
  - role: Attacker
    deviation_must_contain: [voteOnGauge, claimBribe, unvote]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000_000
