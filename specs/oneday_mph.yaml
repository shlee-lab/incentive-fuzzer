contract: targets/tier_g_oneday/MphFrontRun.sol
contract_name: MphFrontRun
deploy_value_wei: 0
deploy_args:
  - "@@ASSET"
  - "@@REWARD"

tokens:
  - name: ASSET
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000     # 100,000 ASSET (honest staker proxy)
      Attacker:  100_000_000_000_000_000_000_000     # 100,000 ASSET capital
  - name: REWARD
    decimals: 18
    initial_balances:
      __admin__: 1_000_000_000_000_000_000_000_000   # 1M REWARD bank

# Pre-stake a large honest position before attacker enters, and seed reward bank.
setup_calls:
  - { function: deposit, args: { amt: 100_000_000_000_000_000_000_000 } }  # admin pre-stakes 100k ASSET
  - { function: REWARD.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: REWARD
    callable_functions: [deposit, withdraw, harvest, claimReward]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 2000
    compound_template:
      - fn: deposit
        phase: 0
        values: [100_000_000_000_000_000_000_000]    # full 100k ASSET
      - fn: harvest
        phase: 1
        values: [0]
      - fn: claimReward
        phase: 2
        values: [0]
      - fn: withdraw
        phase: 3
        values: [100_000_000_000_000_000_000_000]

expected_findings:
  - role: Attacker
    deviation_must_contain: [deposit, harvest, claimReward, withdraw]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000   # +1 REWARD
