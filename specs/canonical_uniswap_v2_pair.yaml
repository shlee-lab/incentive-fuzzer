contract: targets/tier_b_canonical/UniswapV2Pair.sol
contract_name: UniswapV2Pair
deploy_value_wei: 0
deploy_args:
  - "@@TKA"
  - "@@TKB"

# Same attack scenario as uranium_pair_full.yaml — Attacker tries to drain
# via swap(big, 0, attacker, ""). Expected: NO finding because the K
# invariant is correctly enforced.

tokens:
  - name: TKA
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000
      Attacker: 0
  - name: TKB
    decimals: 18
    initial_balances:
      __admin__: 10_000_000_000_000_000_000_000

setup_calls:
  - { function: TKA.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000 } }
  - { function: TKB.transfer, args: { to: "@@self", amount: 1_000_000_000_000_000_000_000 } }
  - { function: sync }
  - { function: TKB.transfer, args: { to: "@@self", amount: 1 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: TKA
    callable_functions: [swap, sync, skim, mint, burn]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: true
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    try_compound_pair_insertion: true

value_pool_extras:
  - 990_000_000_000_000_000_000

expected_findings: []
