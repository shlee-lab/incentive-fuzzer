contract: targets/tier_d_reentrancy/VulnVault.sol
contract_name: VulnVault
deploy_value_wei: 10_000_000_000_000_000_000   # 10 ETH initial liquidity in vault

# POSITIVE CONTROL #4 (reentrancy): the new attack class.
# - VulnVault has the textbook reentrancy bug (call before state update).
# - Attacker role is deployed as a SMART CONTRACT (ReentrancyAttacker.sol),
#   not an EOA. Its receive() re-enters withdraw() during the external call.
# - HonestUser made an honest deposit so vault has >10 ETH to drain.
# - Honest scenario: Attacker does nothing.
# - Deviation: Attacker calls attack(vault) with some seed deposit;
#   the contract code drains the entire vault in a single tx via reentry.
# Expected: TP_protocol_drain at the full vault size.

roles:
  - name: HonestUser
    initial_eth_wei: 100_000_000_000_000_000_000      # 100 ETH
    primary_asset: ETH
    default_phase: 0
    callable_functions: [deposit, withdraw]
  - name: Attacker
    initial_eth_wei: 10_000_000_000_000_000_000       # 10 ETH (seed + gas)
    primary_asset: ETH
    default_phase: 2
    callable_functions: [attack, sweep]
    code_path: targets/tier_d_reentrancy/ReentrancyAttacker.sol
    code_name: ReentrancyAttacker

honest_strategies:
  HonestUser:
    actions:
      - { function: deposit, args: { value_wei: 50_000_000_000_000_000_000 }, phase: 0 }   # 50 ETH
  Attacker:
    actions: []

mutator_hints:
  HonestUser:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: true
    try_numeric_mutation: false
    try_compound_pair_insertion: true
    compound_phase_first: 2
    compound_phase_second: 3

expected_findings:
  - role: Attacker
    deviation_must_contain: [attack]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 30_000_000_000_000_000_000   # >30 ETH drained
