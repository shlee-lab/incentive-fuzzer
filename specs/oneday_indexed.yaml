contract: targets/tier_g_oneday/IndexedNDX.sol
contract_name: IndexedNDX
deploy_value_wei: 0
deploy_args:
  - "@@A"
  - "@@B"

tokens:
  - name: A
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000
      Attacker:   80_000_000_000_000_000_000_000     # 80,000 A pump
  - name: B
    decimals: 18
    initial_balances:
      __admin__: 100_000_000_000_000_000_000_000
      Attacker:    1_000_000_000_000_000_000_000     # 1,000 B (initial position)

setup_calls:
  - { function: joinPool, args: { amtA: 100_000_000_000_000_000_000_000, amtB: 100_000_000_000_000_000_000_000 } }

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: A
    callable_functions: [joinPool, swapAForB, swapBForA, exitPool]

honest_strategies:
  Attacker:
    actions: []

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    max_candidates_per_role: 2000
    compound_template:
      - { fn: joinPool,    phase: 0 }
      - { fn: swapBForA,   phase: 1 }
      - { fn: exitPool,    phase: 2 }

value_pool_extras:
  - 1_000_000_000_000_000_000_000           # 1,000 A
  - 100_000_000_000_000_000_000             # 100 A
  - 500_000_000_000_000_000_000             # 500 A
  - 1_000_000_000_000_000_000_000           # 1,000 B (small swap)
  - 10_000_000_000_000_000_000_000          # 10,000 swap (medium)
  - 50_000_000_000_000_000_000_000          # 50,000 swap (large)
  - 100_000_000_000_000_000_000_000         # 100,000 share exit
  - 1_000_000_000_000_000_000_000_000       # 1,000,000 share exit

expected_findings:
  - role: Attacker
    deviation_must_contain: [joinPool, swapBForA, exitPool]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 1_000_000_000_000_000_000
