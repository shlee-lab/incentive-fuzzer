contract: targets/tier1_trivial/SimpleAuction.sol
contract_name: SimpleAuction
deploy_value_wei: 100_000_000_000_000_000_000   # 100 ETH escrow prefund
deploy_args:
  - "@Seller"                               # constructor arg: seller
  - 1_000_000_000_000_000_000               # constructor arg: reserve = 1 ETH

roles:
  - name: Bidder
    initial_eth_wei: 1_000_000_000_000_000_000_000   # 1000 ETH
    callable_functions: [bid, withdraw]
  - name: Seller
    initial_eth_wei: 1_000_000_000_000_000_000_000   # 1000 ETH
    callable_functions: [bid, settle, withdraw]

honest_strategies:
  Bidder:
    actions:
      - { function: bid, args: { value_wei: 2_000_000_000_000_000_000 } }   # 2 ETH
  Seller:
    actions:
      - { function: settle }
      - { function: withdraw }

mutator_hints:
  Seller:
    try_self_targeting: true
    try_skip_actions: true
    try_action_insertion: true
    try_numeric_mutation: false
  Bidder:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false

expected_findings:
  - role: Seller
    deviation_must_contain: [bid]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 500_000_000_000_000_000   # 0.5 ETH
