contract: targets/tier2_realistic/ReferralVault.sol
contract_name: ReferralVault
deploy_value_wei: 0
deploy_args:
  - "@@USDC"        # underlying token

tokens:
  - name: USDC
    decimals: 6
    initial_balances:
      User: 1_000_000_000          # 1000 USDC (6 decimals)
      Referrer: 0
      __admin__: 1_000_000_000     # admin will fund the rewardPool

setup_calls:
  - { function: fundRewards, args: { amount: 1_000_000_000 } }   # 1000 USDC reward pool

roles:
  - name: User
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    callable_functions: [depositWithReferrer, redeem]
  - name: Referrer
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDC
    callable_functions: [depositWithReferrer]

honest_strategies:
  User:
    actions:
      - { function: depositWithReferrer, args: { amount: 100_000_000, referrer: "@Referrer" } }   # 100 USDC deposit, 5 USDC bonus to Referrer
  Referrer:
    actions: []

mutator_hints:
  User:
    try_self_targeting: true
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
  Referrer:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false

expected_findings:
  - role: User
    deviation_must_contain: [depositWithReferrer]
    payoff_higher_than_honest: true
    min_payoff_diff_wei: 4_000_000   # 4 USDC (6 decimals)
