contract: targets/tier_g_oneday/JITLiquidity.sol
contract_name: JITLiquidity
deploy_value_wei: 0
deploy_args:
- '@@A'
- '@@B'
tokens:
- name: A
  decimals: 18
  initial_balances:
    __admin__: 100000000000000000000000
    Attacker: 100000000000000000000000
    VictimSwapper: 50000000000000000000000
- name: B
