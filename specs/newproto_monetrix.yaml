contract: targets/tier_i_newprotocol/MonetrixSUSDM.sol
contract_name: MonetrixSUSDM
deploy_value_wei: 0
deploy_args:
  - "@@USDM"
  - "@Vault"

tokens:
  - name: USDM
    decimals: 6
    initial_balances:
      __admin__:        100_000_000_000   # 100,000 USDM (pre-existing stakers, vault yield budget)
      Attacker:         100_000_000_000   # 100,000 USDM (very capitalized attacker)
      Vault:             10_000_000_000   # 10,000 USDM (yield budget routed via Vault role)

# Pre-existing stake from another depositor so attacker is not the
# first depositor (closes the inflation window if it were open).
setup_calls:
  - { function: deposit, args: { assets: 50_000_000_000 } }   # admin proxies a 50k USDM stake

roles:
  - name: Attacker
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDM
    callable_functions: [deposit, mint, cooldownShares, claimUnstake, advance_time]
  - name: Vault
    initial_eth_wei: 1_000_000_000_000_000_000_000
    primary_asset: USDM
    callable_functions: [injectYield]

honest_strategies:
  Attacker:
    actions: []
  Vault:
    actions:
      - { function: injectYield, args: { amount: 5_000_000_000 }, phase: 1 }    # 5,000 USDM yield drop

mutator_hints:
  Attacker:
    try_self_targeting: false
    try_skip_actions: false
    try_action_insertion: false
    try_numeric_mutation: false
    try_compound_pair_insertion: false
    auto_compound_templates: true
    max_candidates_per_role: 3000
  Vault:
    try_self_targeting: false
    try_skip_actions: false

value_pool_extras:
  - 100_000_000_000          # 100k USDM
  - 50_000_000_000           # 50k
  - 10_000_000_000           # 10k
  - 1_000_000                # 1 USDM
  - 1                        # 1 wei (donation)

expected_findings: []
